[pytest]
# ── S2: Test Configuration ──────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show extra test summary info for failed/skipped tests
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Custom markers
markers =
    unit: Unit tests (fast, no external deps)
    integration: Integration tests (require running server)
    slow: Slow tests (browser/network)
    core: Tests for core/ modules
    datasource: Tests for datasources/ modules
    api: Tests for API routes
    asyncio: Async tests (managed by pytest-asyncio)

# Async support
asyncio_mode = auto

# Logging
log_cli = false
log_cli_level = WARNING
